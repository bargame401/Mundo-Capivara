<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundo das Capivaras</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }
    header {
      background-color: #68b684;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      padding: 20px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    footer {
      background-color: #68b684;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Bem-vindo ao Mundo das Capivaras</h1>
    <p>O maior roedor do mundo em destaque!</p>
  </header>
  <main>
    <h2>Galeria de Capivaras</h2>
    <div class="gallery">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Capivara.JPG/800px-Capivara.JPG" alt="Capivara em um parque">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Capybara_%28Hydrochoerus_hydrochaeris%29.JPG/800px-Capybara_%28Hydrochoerus_hydrochaeris%29.JPG" alt="Capivara descansando na grama">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Capybara_and_Birds_-_Pantanal_%2835987275932%29.jpg/800px-Capybara_and_Birds_-_Pantanal_%2835987275932%29.jpg" alt="Capivara com pássaros no Pantanal">
    </div>
  </main>
  <footer>
    <p>Site sobre capivaras © 2025</p>
  </footer>
</body>
</html>
